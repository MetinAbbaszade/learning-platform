name: Code Quality

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited
  push:
    branches:
      - main

jobs:
  code-quality:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Biome
        id: biome
        continue-on-error: true
        run: pnpm exec biome ci . --reporter=github

      - name: Check dependency consistency
        id: syncpack
        continue-on-error: true
        run: pnpm run deps:check

      - name: Check TypeScript
        id: typecheck
        continue-on-error: true
        run: pnpm run check-types

      - name: Build apps and packages
        id: build
        continue-on-error: true
        run: pnpm run build

      - name: Enforce quality gates
        if: always()
        run: |
          echo "biome outcome: ${{ steps.biome.outcome }}"
          echo "syncpack outcome: ${{ steps.syncpack.outcome }}"
          echo "typecheck outcome: ${{ steps.typecheck.outcome }}"
          echo "build outcome: ${{ steps.build.outcome }}"

          if [ "${{ steps.biome.outcome }}" != "success" ] || \
             [ "${{ steps.syncpack.outcome }}" != "success" ] || \
             [ "${{ steps.typecheck.outcome }}" != "success" ] || \
             [ "${{ steps.build.outcome }}" != "success" ]; then
            echo "One or more quality gates failed."
            exit 1
          fi

          echo "All quality gates passed."