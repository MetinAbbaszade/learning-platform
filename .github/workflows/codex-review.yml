name: Codex Review

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  codex-review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GITHUB_TOKEN: ${{ github.token }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      REPOSITORY: ${{ github.repository }}

    steps:
      - name: Checkout pull request merge commit
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Fetch base and head refs
        run: |
          set -euxo pipefail
          git fetch --no-tags origin \
            "${{ github.event.pull_request.base.ref }}" \
            +refs/pull/${{ github.event.pull_request.number }}/head

      - name: Generate review output schema
        run: |
          cat <<'JSON' > codex-output-schema.json
          {
            "type": "object",
            "properties": {
              "findings": {
                "type": "array",
                "items": {
                  "type": "object",
                  "properties": {
                    "title": {
                      "type": "string",
                      "maxLength": 80
                    },
                    "body": {
                      "type": "string",
                      "minLength": 1
                    },
                    "confidence_score": {
                      "type": "number",
                      "minimum": 0,
                      "maximum": 1
                    },
                    "priority": {
                      "type": "integer",
                      "minimum": 0,
                      "maximum": 3
                    },
                    "code_location": {
                      "type": "object",
                      "properties": {
                        "absolute_file_path": {
                          "type": "string",
                          "minLength": 1
                        },
                        "line_range": {
                          "type": "object",
                          "properties": {
                            "start": {
                              "type": "integer",
                              "minimum": 1
                            },
                            "end": {
                              "type": "integer",
                              "minimum": 1
                            }
                          },
                          "required": [
                            "start",
                            "end"
                          ],
                          "additionalProperties": false
                        }
                      },
                      "required": [
                        "absolute_file_path",
                        "line_range"
                      ],
                      "additionalProperties": false
                    }
                  },
                  "required": [
                    "title",
                    "body",
                    "confidence_score",
                    "priority",
                    "code_location"
                  ],
                  "additionalProperties": false
                }
              },
              "overall_correctness": {
                "type": "string",
                "enum": [
                  "patch is correct",
                  "patch is incorrect"
                ]
              },
              "overall_explanation": {
                "type": "string",
                "minLength": 1
              },
              "overall_confidence_score": {
                "type": "number",
                "minimum": 0,
                "maximum": 1
              }
            },
            "required": [
              "findings",
              "overall_correctness",
              "overall_explanation",
              "overall_confidence_score"
            ],
            "additionalProperties": false
          }
          JSON

      - name: Build review prompt
        run: |
          {
            printf '%s\n' "You are acting as a reviewer for a proposed code change made by another engineer."
            printf '%s\n' "Focus on issues that impact correctness, performance, security, maintainability, or developer experience."
            printf '%s\n' "Flag only actionable issues introduced by the pull request."
            printf '%s\n' "When you flag an issue, provide a short, direct explanation and cite the affected file and line range."
            printf '%s\n' "Prioritize severe issues and avoid nit-level comments unless they block understanding of the diff."
            printf '%s\n' "After listing findings, produce an overall correctness verdict (\"patch is correct\" or \"patch is incorrect\") with a concise justification and a confidence score between 0 and 1."
            printf '%s\n' "Ensure that file citations and line numbers are exactly correct using the tools available; if they are incorrect your comments will be rejected."
            printf '\n'
            printf '%s\n' "Repository: ${REPOSITORY}"
            printf '%s\n' "Pull Request #: ${PR_NUMBER}"
            printf '%s\n' "Base ref: ${{ github.event.pull_request.base.ref }}"
            printf '%s\n' "Head ref: ${{ github.event.pull_request.head.ref }}"
            printf '%s\n' "Base SHA: ${BASE_SHA}"
            printf '%s\n' "Head SHA: ${HEAD_SHA}"
            printf '%s\n' "Changed files:"
            git --no-pager diff --name-status "${BASE_SHA}" "${HEAD_SHA}"
            printf '\n'
            printf '%s\n' "Unified diff (context=5):"
            git --no-pager diff --unified=5 --stat=200 "${BASE_SHA}" "${HEAD_SHA}"
            printf '\n'
            git --no-pager diff --unified=5 "${BASE_SHA}" "${HEAD_SHA}"
          } > codex-prompt.md

      - name: Run Codex review
        id: run-codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: codex-prompt.md
          output-schema-file: codex-output-schema.json
          output-file: codex-output.json
          sandbox: read-only

      - name: Publish inline review comments
        if: ${{ always() }}
        run: |
          set -euo pipefail

          if [ ! -s codex-output.json ]; then
            echo "No Codex output found; skipping review comments."
            exit 0
          fi

          findings_count=$(jq '.findings | length' codex-output.json)
          if [ "${findings_count}" -eq 0 ]; then
            echo "Codex reported no findings."
            exit 0
          fi

          jq -c --arg commit "${HEAD_SHA}" '.findings[] | {
            body: ("**" + .title + "**\n\n" + .body + "\n\nConfidence: " + (.confidence_score | tostring) + "\nPriority: P" + (.priority | tostring)),
            commit_id: $commit,
            path: .code_location.absolute_file_path,
            line: .code_location.line_range.end,
            side: "RIGHT",
            start_line: (if .code_location.line_range.start != .code_location.line_range.end then .code_location.line_range.start else null end),
            start_side: (if .code_location.line_range.start != .code_location.line_range.end then "RIGHT" else null end)
          } | with_entries(select(.value != null))' codex-output.json > findings.jsonl

          while IFS= read -r payload; do
            curl -sS \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPOSITORY}/pulls/${PR_NUMBER}/comments" \
              -d "${payload}"
          done < findings.jsonl

      - name: Publish summary comment
        if: ${{ always() }}
        run: |
          set -euo pipefail

          if [ ! -s codex-output.json ]; then
            echo "No Codex output found; skipping summary comment."
            exit 0
          fi

          verdict=$(jq -r '.overall_correctness' codex-output.json)
          explanation=$(jq -r '.overall_explanation' codex-output.json)
          confidence=$(jq -r '.overall_confidence_score' codex-output.json)
          body=$(jq -n \
            --arg verdict "${verdict}" \
            --arg explanation "${explanation}" \
            --arg confidence "${confidence}" \
            '{body: ("**Codex automated review**\n\nVerdict: " + $verdict + "\nConfidence: " + $confidence + "\n\n" + $explanation)}')

          curl -sS \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
            -d "${body}"
